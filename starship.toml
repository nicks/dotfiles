# Starship prompt configuration
# https://starship.rs/config/

command_timeout = 5000

format = """
$username\
$hostname\
$directory\
$git_state\
${custom.jj}\
$cmd_duration\
$line_break\
$python\
$character"""

[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "

[directory]
truncation_length = 5
truncate_to_repo = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[git_branch]
disabled = true

[git_status]
disabled = true

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "

[python]
symbol = " "

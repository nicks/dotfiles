# Reference: https://github.com/i3/i3/blob/next/etc/config

start-at-login = true

# i3 doesn't have "normalizations" feature that why we disable them here.
# But the feature is very helpful.
# Normalizations eliminate all sorts of weird tree configurations that don't make sense.
# Give normalizations a chance and enable them back.
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Run Sketchybar together with AeroSpace
# sketchbar has a built-in detection of already running process,
# so it won't be run twice on AeroSpace restart
after-startup-command = ['exec-and-forget sketchybar']

automatically-unhide-macos-hidden-apps = false

# Notify Sketchybar about workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_focus_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]
on-focus-changed = ['exec-and-forget sketchybar --trigger aerospace_focus_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE']

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.bottom = 40
outer.top = 0
outer.left = 0
outer.right = 0

[exec.env-vars]
    PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin'

[mode.main.binding]
    cmd-h = [] # Disable "hide application"
    cmd-m = [] # Disable "minimize window"
    cmd-alt-h = [] # Disable "hide others"

    # kill focused window
    alt-shift-q = 'close'

    # focus/move: try within the workspace, then cross-workspace at the edge
    alt-j = 'exec-and-forget ~/src/dotfiles/bin/aerospace-workspace-nav.sh left focus'
    alt-k = 'exec-and-forget ~/src/dotfiles/bin/aerospace-workspace-nav.sh right focus'

    alt-shift-j = 'exec-and-forget ~/src/dotfiles/bin/aerospace-workspace-nav.sh left move'
    alt-shift-k = 'exec-and-forget ~/src/dotfiles/bin/aerospace-workspace-nav.sh right move'

    alt-ctrl-shift-j = 'move-workspace-to-monitor --wrap-around left'
    alt-ctrl-shift-k = 'move-workspace-to-monitor --wrap-around right'
    
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-0 = 'workspace 10'
    # Workspaces 11+ are reachable by walking off the edge with alt-j/alt-k.

    alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
    alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
    alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
    alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
    alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
    alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
    alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
    alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
    alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'
    alt-shift-0 = 'move-node-to-workspace 10 --focus-follows-window'

    alt-s = 'layout v_accordion' # 'layout stacking' in i3
    alt-w = 'layout h_accordion' # 'layout tabbed' in i3
    alt-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

    alt-shift-t = 'exec-and-forget ~/src/dotfiles/bin/aerospace-sort-windows.sh'

    alt-shift-c = 'reload-config'
    alt-shift-b = 'exec-and-forget sketchybar --reload'

[[on-window-detected]]
  if.app-name-regex-substring = 'System Settings'
  run = 'layout tiling'

[[on-window-detected]]
  if.app-id = 'com.apple.iphonesimulator'
  run = 'layout tiling'

[[on-window-detected]]
  if.app-id = 'com.linear'
  run = 'layout tiling'
